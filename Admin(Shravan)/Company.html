<html>
<head>
  <style>
    .responsive-grid-container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 20px;
}

.responsive-grid {
  display: grid;
  /* Auto-fit creates as many columns as possible with minimum width of 200px */
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
  width: 100%;
}

.grid-item {
  background: black;
  color: white;
  border-radius: 10px;
  padding: 30px;
  font-size: 20px;
  font-weight: bold;
  display: flex;
  justify-content: center;
  align-items: center;
  box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.grid-item:hover {
  transform: translateY(-5px);
  box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
}

/* Item spanning options (examples) */
/* For larger layouts you can make items span multiple columns or rows */
.grid-item.span-2 {
  grid-column: span 2;
}

.grid-item.span-row-2 {
  grid-row: span 2;
}

/* Different breakpoints for different screen sizes */
@media (max-width: 992px) {
  .responsive-grid {
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 15px;
  }
}
  .grid-item {
    padding:20px;
    font-size:16px;

  }
  
    </style>
  <body>
  <div class="responsive-grid-container">
  <div class="responsive-grid">
    <div class="grid-item">Zomato</div>
    <div class="grid-item">Swiggy</div>
    <div class="grid-item">Amazon</div>
    <div class="grid-item">Flipcart</div>
    <div class="grid-item">Blinkit</div>
    <div class="grid-item">jio mart</div>
  </div>
</div>
</body>
</html>
