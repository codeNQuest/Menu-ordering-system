<html>
  <head>
      <style>
        .Details {
          border: 2px solid rgb(179, 175, 175);
          width: 300px;
          border-radius: 10px;
          padding: 20px;
          margin: auto;
          margin-top: 100px;
          text-align: left;
          
        }
        input {
          border-radius: 5px;
          width: 100%;
          padding: 8px;
          margin: 4px 0;
          box-sizing: border-box;
        }
        button {
          background-color: #050713;
          color: white;
          padding: 10px 15px;
          border: 10px;
          border-radius: 20px;
          cursor: pointer;
          margin-top: 10px;
          width: 100%;
        }
        button:hover {
          background-color: #272a40;
        }
        .purpose {
          width: 100%;
          padding: 8px;
          border-radius: 5px;
          margin-top: 4px;
        }
        .Company {
          width: 100%;
          padding: 8px;
          border-radius: 5px;
          margin-top: 4px;
        }
      </style>
  </head>
  <body>
    <div class="Details">
    <form action="/submit" method="post">
      <h3>Person Name</h3>
      
      <input type="text" placeholder=" Enter Name" required><br>
      
      <h3>phone number</h3>
      
      <input type="tel" placeholder="Phone number" pattern="[0-9]{10}" required><br>
           
       <h3>Flat number</h3>
      
      <input type="text" placeholder=" Enter Flat number" required><br>
      
      <h3>Purpose</h3>
      
      <select class="purpose">
        <option value="" disabled selected>Select Purpose</option>
        <option value="business">Business</option>
        <option value="personal">Guest</option>
        <option value="delivery">Delivery</option>
        <option value="other">Other</option>
      </select>
      
      <h3>Company</h3>
      
      <select class="Company">
        <option>Select Company</option>
        <option value="business">Zomato</option>
        <option value="personal">Swiggy</option>
        <option value="delivery">Flipcart</option>
        <option value="other">Amazon</option>
      </select>
      
      <button type="submit" href="adminpage">Submit</button>
      
    </form>
    </div>
    
  </body>
</html>
